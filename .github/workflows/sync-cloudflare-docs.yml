name: Sync Cloudflare Docs

on:
  schedule:
    # Run every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for Cloudflare docs updates
        id: check
        run: npx tsx scripts/sync-cloudflare-docs.ts 2>&1 | tee /tmp/sync-output.txt || true
        continue-on-error: true

      - name: Apply updates if found
        id: apply
        if: steps.check.outcome == 'failure'
        run: |
          npx tsx scripts/sync-cloudflare-docs.ts --apply 2>&1 | tee /tmp/apply-output.txt
          # Check if files actually changed
          if git diff --quiet src/schemas/fields.ts; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.apply.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Update fields from Cloudflare docs'
          title: 'Sync fields from Cloudflare docs'
          body: |
            Automated sync from [cloudflare/cloudflare-docs](https://github.com/cloudflare/cloudflare-docs).

            ```
            ${{ steps.apply.outputs.changes == 'true' && 'See commit diff for details' || 'No changes' }}
            ```

            Review the new fields and ensure types are correct before merging.
          branch: automated/sync-cloudflare-docs
          delete-branch: true
          labels: automated,schema-update
