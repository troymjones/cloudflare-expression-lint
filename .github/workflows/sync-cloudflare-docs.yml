name: Sync Cloudflare Docs

on:
  schedule:
    # Run every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for updates
        id: check
        run: npx tsx scripts/sync-cloudflare-docs.ts 2>&1 | tee /tmp/sync-check.txt
        continue-on-error: true

      - name: Apply updates
        id: apply
        if: steps.check.outcome == 'failure'
        run: |
          npx tsx scripts/sync-cloudflare-docs.ts --apply
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests after sync
        if: steps.apply.outputs.changes == 'true'
        run: |
          npm run build
          npm test

      - name: Create Pull Request
        if: steps.apply.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Sync fields and functions from Cloudflare docs'
          title: 'Automated: Sync schemas from Cloudflare docs'
          body-path: sync-summary.md
          branch: automated/sync-cloudflare-docs
          delete-branch: true
          labels: automated,schema-update
